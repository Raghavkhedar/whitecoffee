<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>White Coffee — UI Redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(ellipse at 22% 55%, #0D1836 0%, #05091A 58%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #root {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Subtle grid overlay on page bg */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    ::-webkit-scrollbar { width: 0; height: 0; }
    * { -webkit-tap-highlight-color: transparent; }
    input, button, textarea { font-family: 'DM Sans', sans-serif; }

    /* ── Keyframes ── */
    @keyframes wcSpin      { to { transform: rotate(360deg); } }
    @keyframes wcPulse     { 0%,100% { transform: scale(1); opacity: 0.45; } 50% { transform: scale(2.2); opacity: 0; } }
    @keyframes wcFloat     { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-7px); } }
    @keyframes wcSlideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes wcFadeUp     { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes wcSheetUp    { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes wcPulseRing  { 0%,100% { opacity: 0.55; transform: translate(-50%,-50%) scale(1); } 50% { opacity: 0.18; transform: translate(-50%,-50%) scale(1.07); } }
    @keyframes screenIn    { from { opacity: 0; transform: translateX(36px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes screenInBack{ from { opacity: 0; transform: translateX(-36px); } to { opacity: 1; transform: translateX(0); } }

    /* ── Screen transitions ── */
    .screen-enter { animation: screenIn     0.30s cubic-bezier(0.4, 0, 0.2, 1) both; }
    .screen-back  { animation: screenInBack 0.30s cubic-bezier(0.4, 0, 0.2, 1) both; }

    /* ── Staggered card entrance ── */
    .wc-s0 { animation: wcFadeUp 0.32s 0.00s both; }
    .wc-s1 { animation: wcFadeUp 0.32s 0.05s both; }
    .wc-s2 { animation: wcFadeUp 0.32s 0.10s both; }
    .wc-s3 { animation: wcFadeUp 0.32s 0.15s both; }
    .wc-s4 { animation: wcFadeUp 0.32s 0.20s both; }
    .wc-s5 { animation: wcFadeUp 0.32s 0.25s both; }
    .wc-s6 { animation: wcFadeUp 0.32s 0.30s both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="wc-components.jsx"></script>
  <script type="text/babel" src="wc-screens.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "role": "office",
      "homeLayout": "list"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [nav, setNav] = React.useState({ screen: 'login', dir: 'fwd', key: 0 });

      const go = React.useCallback((screen, dir = 'fwd') => {
        setNav(prev => ({ screen, dir, key: prev.key + 1 }));
      }, []);

      const renderScreen = () => {
        switch (nav.screen) {
          case 'login':         return <LoginScreen onLogin={() => go('home')} />;
          case 'home':          return <HomeScreen role={t.role} layout={t.homeLayout} onNavigate={go} />;
          case 'attendance':    return <AttendanceScreen onBack={() => go('home', 'back')} />;
          case 'office_att':    return <OfficeAttScreen onBack={() => go('home', 'back')} />;
          case 'notifications': return <NotificationsScreen onBack={() => go('home', 'back')} />;
          case 'leave':         return <LeaveScreen onBack={() => go('home', 'back')} />;
          case 'mt_buy':        return <MtBuyScreen onBack={() => go('home', 'back')} />;
          case 'mt_request':    return <MtRequestScreen onBack={() => go('home', 'back')} />;
          case 'mat_transfer':  return <TransferScreen type="material" onBack={() => go('home', 'back')} />;
          case 'tool_transfer': return <TransferScreen type="tool" onBack={() => go('home', 'back')} />;
          case 'work_progress': return <WorkProgressScreen onBack={() => go('home', 'back')} />;
          default:              return <LoginScreen onLogin={() => go('home')} />;
        }
      };

      return (
        <div style={{ position: 'relative', zIndex: 1 }}>
          <IOSDevice dark>
            <div
              key={nav.key}
              className={nav.dir === 'back' ? 'screen-back' : 'screen-enter'}
              style={{ height: '100%' }}
            >
              {renderScreen()}
            </div>
          </IOSDevice>

          <TweaksPanel>
            <TweakSection label="Role" />
            <TweakRadio
              label="User role"
              value={t.role}
              options={['operations', 'office', 'admin']}
              onChange={v => setTweak('role', v)}
            />
            <TweakSection label="Home Screen" />
            <TweakRadio
              label="Card layout"
              value={t.homeLayout}
              options={['grid', 'list']}
              onChange={v => setTweak('homeLayout', v)}
            />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="84" fill="#0A1628"/>
      <rect x="38" y="8" width="44" height="68" rx="6" fill="#1A3B6E"/>
      <rect x="42" y="14" width="36" height="10" rx="2" fill="#2563EB" opacity=".8"/>
      <rect x="42" y="28" width="36" height="7" rx="2" fill="white" opacity=".15"/>
      <rect x="42" y="38" width="17" height="7" rx="2" fill="white" opacity=".12"/>
      <rect x="61" y="38" width="17" height="7" rx="2" fill="white" opacity=".12"/>
      <rect x="42" y="48" width="17" height="7" rx="2" fill="white" opacity=".12"/>
      <rect x="61" y="48" width="17" height="7" rx="2" fill="white" opacity=".12"/>
      <rect x="42" y="58" width="36" height="6" rx="2" fill="#2563EB" opacity=".7"/>
    </svg>
  </template>
</body>
</html>
